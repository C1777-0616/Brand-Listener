<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>仪表盘 - Brand Listener</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-900 antialiased">
  <!-- Sidebar -->
  <aside class="w-64 bg-slate-900 text-white fixed h-full z-20 flex flex-col">
    <div class="p-5 border-b border-slate-800"><div class="flex items-center gap-2"><iconify-icon icon="mdi:ShieldSearch" class="text-2xl text-indigo-400"></iconify-icon><span class="font-bold text-base">BrandListen AI</span></div></div>
    <nav class="flex-1 p-3 space-y-1 text-sm">
      <a href="/" class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-indigo-600 text-white font-medium transition"><iconify-icon icon="mdi:view-dashboard"></iconify-icon>仪表盘首页</a>
      <a href="/competitor" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:text-white hover:bg-slate-800 transition"><iconify-icon icon="mdi:radar"></iconify-icon>竞品监听管理</a>
      <a href="/culture" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:text-white hover:bg-slate-800 transition"><iconify-icon icon="mdi:account-group"></iconify-icon>品牌文化监听</a>
      <a href="/voc" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:text-white hover:bg-slate-800 transition"><iconify-icon icon="mdi:comment-quote"></iconify-icon>用户之声分析</a>
      <a href="/report" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:text-white hover:bg-slate-800 transition"><iconify-icon icon="mdi:file-chart"></iconify-icon>报告生成中心</a>
      <a href="/weibo" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:text-white hover:bg-slate-800 transition"><iconify-icon icon="mdi:sina-weibo"></iconify-icon>微博监听</a>
      <div class="pt-4 pb-1 px-3 text-xs text-slate-600 uppercase tracking-wider">系统管理</div>
      <a href="/settings" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:text-white hover:bg-slate-800 transition"><iconify-icon icon="mdi:cog"></iconify-icon>系统设置</a>
    </nav>
  </aside>
  <!-- Main -->
  <div class="ml-64 p-8">
    <div class="flex items-center justify-between mb-8">
      <div><h1 class="text-2xl font-bold text-slate-900">仪表盘首页</h1><p class="text-sm text-slate-500 mt-1">品牌竞争态势总览</p></div>
      <div class="flex items-center gap-3">
        <div class="flex bg-white rounded-lg border border-slate-200 overflow-hidden text-sm">
          <button class="days-btn px-3 py-1.5 hover:bg-slate-50 transition" data-days="7">7天</button>
          <button class="days-btn px-3 py-1.5 bg-indigo-600 text-white font-medium" data-days="30">30天</button>
          <button class="days-btn px-3 py-1.5 hover:bg-slate-50 transition" data-days="90">90天</button>
        </div>
        <button id="runBtn" class="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-lg shadow-lg shadow-indigo-200/50 text-sm font-medium transition">
          <iconify-icon icon="mdi:play-circle"></iconify-icon>运行流水线
        </button>
      </div>
    </div>

    <!-- KPI cards -->
    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6 mb-8" id="kpiGrid">
      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6"><div class="flex items-center gap-3 text-indigo-600 mb-2"><iconify-icon icon="mdi:database" class="text-xl"></iconify-icon><span class="text-sm font-medium text-slate-400">总条目</span></div><p class="text-3xl font-bold" id="kpi-total">—</p></div>
      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6"><div class="flex items-center gap-3 text-emerald-600 mb-2"><iconify-icon icon="mdi:tag-multiple" class="text-xl"></iconify-icon><span class="text-sm font-medium text-slate-400">追踪品牌</span></div><p class="text-3xl font-bold" id="kpi-brands">—</p></div>
      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6"><div class="flex items-center gap-3 text-amber-600 mb-2"><iconify-icon icon="mdi:cellphone-link" class="text-xl"></iconify-icon><span class="text-sm font-medium text-slate-400">活跃平台</span></div><p class="text-3xl font-bold" id="kpi-platforms">—</p></div>
      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6"><div class="flex items-center gap-3 text-rose-600 mb-2"><iconify-icon icon="mdi:fire" class="text-xl"></iconify-icon><span class="text-sm font-medium text-slate-400">热门标签</span></div><p class="text-lg font-bold truncate" id="kpi-hot-tag">—</p></div>
    </div>

    <!-- Charts row -->
    <div class="grid grid-cols-1 xl:grid-cols-2 gap-6 mb-8">
      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
        <h3 class="font-semibold text-slate-900 mb-4">每日发文趋势（按平台）</h3>
        <div id="overviewChart" class="h-72"></div>
      </div>
      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
        <h3 class="font-semibold text-slate-900 mb-4">内容类型分布</h3>
        <div id="typeChart" class="h-72"></div>
      </div>
    </div>

    <!-- Recent entries -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
      <h3 class="font-semibold text-slate-900 mb-4">最新动态</h3>
      <div id="recentEntries" class="space-y-3">
        <div class="text-sm text-slate-400">加载中...</div>
      </div>
    </div>
  </div>

  <script src="/static/api.js"></script>
  <script>
    let currentDays = 30;
    let overviewChart, typeChart;
    const PLATFORM_COLORS = { weibo: '#E6162D', xiaohongshu: '#FF2442', bilibili: '#00A1D6', douyin: '#010101', unknown: '#94A3B8' };
    const TYPE_LABELS = { new_product: '新品发布', promotion: '促销活动', kol_collab: 'KOL合作', user_engagement: '用户互动', offline_event: '线下活动', corporate_news: '企业新闻', product_content: '产品内容', brand_content: '品牌内容' };

    async function loadDashboard(days) {
      currentDays = days;
      try {
        const stats = await fetchEntryStats(days);
        renderKPI(stats);
        renderOverviewChart(stats);
        renderTypeChart(stats);
        renderRecent(days);
      } catch (e) {
        console.error('Dashboard load error:', e);
      }
    }

    function renderKPI(stats) {
      document.getElementById('kpi-total').textContent = stats.total_entries;
      document.getElementById('kpi-brands').textContent = (stats.top_brands || []).length;
      document.getElementById('kpi-platforms').textContent = Object.keys(stats.by_platform || {}).length;
      const topTag = (stats.top_tags || [])[0];
      document.getElementById('kpi-hot-tag').textContent = topTag ? `${topTag.tag} (${topTag.count})` : '—';
    }

    function renderOverviewChart(stats) {
      if (!overviewChart) overviewChart = echarts.init(document.getElementById('overviewChart'));
      const epd = stats.entries_per_day || [];
      const platforms = Object.keys(stats.by_platform || {});
      // Build per-platform daily series
      const series = platforms.map(p => ({
        name: p === 'weibo' ? '微博' : p === 'xiaohongshu' ? '小红书' : p === 'bilibili' ? 'B站' : p,
        type: 'bar', stack: 'total',
        itemStyle: { color: PLATFORM_COLORS[p] || '#94A3B8' },
        data: epd.map(d => d.count),
      }));
      overviewChart.setOption({
        tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
        legend: { top: 0, textStyle: { fontSize: 12 } },
        grid: { left: 40, right: 20, bottom: 30, top: 40 },
        xAxis: { type: 'category', data: epd.map(d => d.date.slice(5)), axisLabel: { fontSize: 11 } },
        yAxis: { type: 'value', minInterval: 1 },
        series: series.length ? series : [{
          name: '发文量', type: 'bar', stack: 'total',
          itemStyle: { color: '#6366F1' },
          data: epd.map(d => d.count),
        }],
      });
    }

    function renderTypeChart(stats) {
      if (!typeChart) typeChart = echarts.init(document.getElementById('typeChart'));
      const types = stats.by_update_type || {};
      const data = Object.entries(types).map(([k, v]) => ({ name: TYPE_LABELS[k] || k, value: v }));
      typeChart.setOption({
        tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
        legend: { orient: 'vertical', right: 10, top: 'center', textStyle: { fontSize: 12 } },
        series: [{
          type: 'pie', radius: ['40%', '70%'], center: ['40%', '50%'],
          label: { show: false },
          emphasis: { label: { show: true, fontSize: 14, fontWeight: 'bold' } },
          data: data,
        }],
      });
    }

    async function renderRecent(days) {
      try {
        const feed = await fetchEntryFeed(1, 8, { days });
        const el = document.getElementById('recentEntries');
        if (!feed.entries || feed.entries.length === 0) {
          el.innerHTML = '<div class="text-sm text-slate-400">暂无数据</div>';
          return;
        }
        const TYPE_ICONS = { weibo: 'mdi:sina-weibo', xiaohongshu: 'mdi:notebook', bilibili: 'mdi:television-classic' };
        el.innerHTML = feed.entries.map(e => {
          const em = e.engagement_metrics || {};
          const tags = (em.ai_tags || []).slice(0, 3);
          const platform = e.platform || 'unknown';
          const icon = TYPE_ICONS[platform] || 'mdi:file-document';
          const platColor = PLATFORM_COLORS[platform] || '#94A3B8';
          return `<div class="flex items-start gap-3 p-3 rounded-lg hover:bg-slate-50 transition">
            <iconify-icon icon="${icon}" class="text-xl mt-0.5" style="color:${platColor}"></iconify-icon>
            <div class="flex-1 min-w-0">
              <div class="text-sm font-medium truncate">${escapeHtml(e.title || '(无标题)')}</div>
              <div class="flex items-center gap-2 mt-1">
                <span class="text-xs text-slate-400">${formatTime(e.published_at)}</span>
                ${tags.map(t => `<span class="text-xs bg-indigo-50 text-indigo-600 px-1.5 py-0.5 rounded">${escapeHtml(t)}</span>`).join('')}
              </div>
            </div>
            ${e.url ? `<a href="${escapeHtml(e.url)}" target="_blank" class="text-slate-400 hover:text-indigo-600"><iconify-icon icon="mdi:open-in-new"></iconify-icon></a>` : ''}
          </div>`;
        }).join('');
      } catch { document.getElementById('recentEntries').innerHTML = '<div class="text-sm text-slate-400">加载失败</div>'; }
    }

    document.addEventListener('DOMContentLoaded', () => {
      // Days filter
      document.querySelectorAll('.days-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.days-btn').forEach(b => { b.classList.remove('bg-indigo-600', 'text-white', 'font-medium'); b.classList.add('hover:bg-slate-50'); });
          btn.classList.add('bg-indigo-600', 'text-white', 'font-medium');
          btn.classList.remove('hover:bg-slate-50');
          loadDashboard(parseInt(btn.dataset.days));
        });
      });

      loadDashboard(currentDays);

      // Run pipeline
      document.getElementById('runBtn').addEventListener('click', async () => {
        const btn = document.getElementById('runBtn'); btn.disabled = true; btn.innerHTML = '<iconify-icon icon="mdi:loading" class="animate-spin"></iconify-icon> 运行中...';
        try { await runPipeline(); loadDashboard(currentDays); btn.innerHTML = '<iconify-icon icon="mdi:check-circle"></iconify-icon> 完成'; setTimeout(() => { btn.disabled = false; btn.innerHTML = '<iconify-icon icon="mdi:play-circle"></iconify-icon> 运行流水线'; }, 1500); }
        catch { btn.innerHTML = '失败'; btn.disabled = false; }
      });

      // Resize charts on window resize
      window.addEventListener('resize', () => { overviewChart && overviewChart.resize(); typeChart && typeChart.resize(); });
    });
  </script>
</body>
</html>
