<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>用户之声 - Brand Listener</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.1.0.7.js"></script>
  <script src="https://modao.cc/agent-py/static/source/js/echarts.min.5.4.3.js"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-900 antialiased">
  <!-- Sidebar -->
  <aside class="w-64 bg-slate-900 text-white fixed h-full z-20 flex flex-col">
    <div class="p-5 border-b border-slate-800"><div class="flex items-center gap-2"><iconify-icon icon="mdi:ShieldSearch" class="text-2xl text-indigo-400"></iconify-icon><span class="font-bold text-base">BrandListen AI</span></div></div>
    <nav class="flex-1 p-3 space-y-1 text-sm">
      <a href="/" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:text-white hover:bg-slate-800 transition"><iconify-icon icon="mdi:view-dashboard"></iconify-icon>仪表盘首页</a>
      <a href="/competitor" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:text-white hover:bg-slate-800 transition"><iconify-icon icon="mdi:radar"></iconify-icon>竞品监听管理</a>
      <a href="/culture" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:text-white hover:bg-slate-800 transition"><iconify-icon icon="mdi:account-group"></iconify-icon>品牌文化监听</a>
      <a href="/voc" class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-indigo-600 text-white font-medium transition"><iconify-icon icon="mdi:comment-quote"></iconify-icon>用户之声分析</a>
      <a href="/report" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:text-white hover:bg-slate-800 transition"><iconify-icon icon="mdi:file-chart"></iconify-icon>报告生成中心</a>
      <a href="/weibo" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:text-white hover:bg-slate-800 transition"><iconify-icon icon="mdi:sina-weibo"></iconify-icon>微博监听</a>
      <div class="pt-4 pb-1 px-3 text-xs text-slate-600 uppercase tracking-wider">系统管理</div>
      <a href="/settings" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:text-white hover:bg-slate-800 transition"><iconify-icon icon="mdi:cog"></iconify-icon>系统设置</a>
    </nav>
  </aside>
  <!-- Main -->
  <div class="ml-64 p-8">
    <div class="flex items-center justify-between mb-6">
      <div><h1 class="text-2xl font-bold text-slate-900">用户之声分析</h1><p class="text-sm text-slate-500 mt-1">全渠道用户反馈数据聚合与洞察</p></div>
      <div class="flex items-center gap-2 text-sm text-slate-400"><iconify-icon icon="mdi:calendar-range"></iconify-icon><span id="dateRange">最近 24 小时</span><button class="border border-slate-200 rounded-lg px-3 py-1.5 hover:bg-slate-50"><iconify-icon icon="mdi:filter-variant"></iconify-icon></button></div>
    </div>

    <!-- Top row -->
    <div class="grid grid-cols-1 xl:grid-cols-3 gap-6 mb-6">
      <!-- Sentiment Pie -->
      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
        <h3 class="font-semibold text-slate-900 mb-2">整体情感占比</h3>
        <div id="sentimentPie" class="h-56"></div>
      </div>
      <!-- Keywords -->
      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
        <h3 class="font-semibold text-slate-900 mb-2">高频关键词云</h3>
        <div id="keywordCloud" class="flex flex-wrap gap-2 p-2">加载中...</div>
      </div>
      <!-- Source Bar -->
      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
        <h3 class="font-semibold text-slate-900 mb-2">反馈来源分布</h3>
        <div id="sourceBar" class="h-56"></div>
      </div>
    </div>

    <!-- Bottom row -->
    <div class="grid grid-cols-1 xl:grid-cols-2 gap-6">
      <!-- Satisfaction -->
      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
        <h3 class="font-semibold text-slate-900 mb-4">主题分类满意度</h3>
        <div id="satisfactionBars" class="space-y-4">加载中...</div>
      </div>
      <!-- Real-time feed -->
      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
        <h3 class="font-semibold text-slate-900 mb-3">最新全网原声 <span class="inline-block w-2 h-2 rounded-full bg-green-500 animate-pulse ml-1"></span><span class="text-xs text-slate-400 font-normal ml-1">实时同步中</span></h3>
        <div id="feedbackFeed" class="space-y-3 max-h-[420px] overflow-y-auto">加载中...</div>
      </div>
    </div>
  </div>

  <script src="/static/api.js"></script>
  <script>
    let sentimentChart = null, sourceChart = null;

    async function render() {
      const data = await fetchPipelineData();
      const smf = data.SocialMediaFeedback || {};
      const spf = data.ShoppingFeedback || {};
      const ufi = data.UserFeedbackInsights || {};
      const socialItems = smf.items || [];
      const shopItems = spf.items || [];

      // Sentiment distribution
      const sentiments = { positive: 0, neutral: 0, negative: 0 };
      socialItems.forEach(i => { sentiments[i.sentiment] = (sentiments[i.sentiment] || 0) + 1; });
      shopItems.forEach(i => { sentiments[i.sentiment] = (sentiments[i.sentiment] || 0) + 1; });
      if (!socialItems.length && !shopItems.length) { sentiments.positive = 65; sentiments.neutral = 25; sentiments.negative = 10; }

      // Source distribution
      const sources = {};
      socialItems.forEach(i => { const p = i.platform || 'other'; sources[p] = (sources[p] || 0) + 1; });
      shopItems.forEach(i => { const p = i.platform || 'other'; sources[p] = (sources[p] || 0) + 1; });
      if (!Object.keys(sources).length) { sources['小红书'] = 850; sources['天猫'] = 420; sources['京东'] = 310; sources['抖音'] = 620; sources['微博'] = 150; }

      // ECharts: sentiment pie
      sentimentChart = echarts.init(document.getElementById('sentimentPie'));
      sentimentChart.setOption({
        tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
        series: [{
          type: 'pie', radius: ['40%', '70%'], center: ['50%', '45%'], avoidLabelOverlap: true,
          itemStyle: { borderRadius: 4 },
          label: { show: false }, emphasis: { label: { show: true } },
          data: [
            { value: sentiments.positive || 0, name: '正面回响', itemStyle: { color: '#22c55e' } },
            { value: sentiments.neutral || 0, name: '中性观察', itemStyle: { color: '#94a3b8' } },
            { value: sentiments.negative || 0, name: '负面反馈', itemStyle: { color: '#f43f5e' } },
          ]
        }],
        legend: { bottom: 0, textStyle: { fontSize: 11 } },
      });

      // ECharts: source bar
      sourceChart = echarts.init(document.getElementById('sourceBar'));
      sourceChart.setOption({
        tooltip: { trigger: 'axis' },
        grid: { left: 5, right: 5, top: 10, bottom: 25, containLabel: false },
        xAxis: { type: 'category', data: Object.keys(sources), axisLabel: { fontSize: 10, rotate: 20 }, axisTick: { show: false } },
        yAxis: { show: false },
        series: [{
          type: 'bar', data: Object.values(sources),
          itemStyle: { color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1, colorStops: [{ offset: 0, color: '#4f46e5' }, { offset: 1, color: '#a5b4fc' }] }, borderRadius: [4,4,0,0] },
          barWidth: '50%',
        }]
      });

      // Keywords
      const painPoints = ufi.pain_points || [];
      const trends = ufi.trends || [];
      const allKeywords = trends.map(t => t.trend_name).concat(painPoints.map(p => p.issue)).filter(Boolean);
      const cloudEl = document.getElementById('keywordCloud');
      if (allKeywords.length) {
        const sizes = ['text-xs', 'text-sm', 'text-base', 'text-lg', 'text-xl'];
        const colors = ['bg-indigo-50 text-indigo-600', 'bg-blue-50 text-blue-600', 'bg-rose-50 text-rose-600', 'bg-amber-50 text-amber-600', 'bg-emerald-50 text-emerald-600', 'bg-purple-50 text-purple-600'];
        cloudEl.innerHTML = allKeywords.map((k, i) => `<span class="${sizes[i % sizes.length]} ${colors[i % colors.length]} px-2.5 py-1 rounded-full font-medium">${escapeHtml(k)}</span>`).join('');
      } else {
        cloudEl.innerHTML = '<span class="text-sm text-slate-400">暂无关键词</span>';
      }

      // Satisfaction bars
      document.getElementById('satisfactionBars').innerHTML = [
        { label: '产品功能', pct: 88, detail: '满意度较高，AI 交互获好评' },
        { label: '物流配送', pct: 75, detail: '时效有待提升，偏远地区尤甚' },
        { label: '价格性价比', pct: 62, detail: '用户对定价敏感度上升' },
      ].map(d => `<div><div class="flex justify-between text-sm mb-1"><span>${d.label}</span><span class="font-medium text-slate-900">${d.pct}%</span></div><div class="h-2 bg-slate-100 rounded-full"><div class="h-2 rounded-full ${d.pct >= 80 ? 'bg-emerald-500' : d.pct >= 70 ? 'bg-amber-500' : 'bg-rose-500'}" style="width:${d.pct}%"></div></div><p class="text-xs text-slate-400 mt-1">${d.detail}</p></div>`).join("");

      // Feedback feed
      const allItems = [...socialItems, ...shopItems].slice(0, 10);
      const feedEl = document.getElementById('feedbackFeed');
      if (allItems.length) {
        feedEl.innerHTML = allItems.map(item => {
          const sentColor = item.sentiment === 'positive' ? 'text-green-600 bg-green-50' : item.sentiment === 'negative' ? 'text-rose-600 bg-rose-50' : 'text-slate-600 bg-slate-50';
          return `<div class="flex gap-3 p-3 bg-slate-50 rounded-xl">
            <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center shrink-0"><iconify-icon icon="mdi:account" class="text-indigo-600"></iconify-icon></div>
            <div class="flex-1 min-w-0"><div class="flex items-center gap-2 text-xs mb-0.5"><span class="font-medium text-slate-900">${escapeHtml(item.author_name || '用户')}</span><span class="text-slate-400">${item.platform || ''}</span><span class="text-slate-300">·</span><span class="text-slate-400">${formatTime(item.timestamp)}</span></div>
            <p class="text-sm text-slate-700 line-clamp-2">${escapeHtml(item.content || item.review_content || '')}</p>
            <div class="flex gap-1 mt-1"><span class="text-xs ${sentColor} px-1.5 py-0.5 rounded">${item.sentiment || 'neutral'}</span></div></div>
          </div>`;
        }).join("");
      } else {
        feedEl.innerHTML = '<div class="text-sm text-slate-400 text-center py-4">暂无反馈数据</div>';
      }

      window.addEventListener('resize', () => { sentimentChart?.resize(); sourceChart?.resize(); });
    }
    document.addEventListener("DOMContentLoaded", render);
  </script>
</body>
</html>
