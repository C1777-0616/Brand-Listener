<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 - Brand Listener</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
</head>
<body class="bg-slate-50 font-sans antialiased">
  <div class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-5xl w-full bg-white rounded-2xl shadow-2xl overflow-hidden flex flex-col md:flex-row">
      <!-- Left: Branding -->
      <div class="md:w-1/2 p-10 flex flex-col justify-between text-white" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
        <div>
          <div class="flex items-center gap-2 mb-6">
            <iconify-icon icon="mdi:ShieldSearch" class="text-3xl text-indigo-200"></iconify-icon>
            <span class="text-xl font-bold">BrandListen AI</span>
          </div>
          <h2 class="text-3xl font-bold leading-tight mb-4">洞察竞争态势<br/>守护品牌文化</h2>
          <ul class="space-y-3 text-sm opacity-90">
            <li class="flex items-start gap-2"><iconify-icon icon="mdi:check-circle" class="text-green-300 mt-0.5 shrink-0"></iconify-icon>实时追踪全网品牌声量与竞品动态</li>
            <li class="flex items-start gap-2"><iconify-icon icon="mdi:check-circle" class="text-green-300 mt-0.5 shrink-0"></iconify-icon>AI 驱动的情感分析与趋势洞察</li>
            <li class="flex items-start gap-2"><iconify-icon icon="mdi:check-circle" class="text-green-300 mt-0.5 shrink-0"></iconify-icon>一键生成专业品牌竞争态势报告</li>
          </ul>
        </div>
        <p class="text-xs opacity-60 mt-8">© 2026 BrandListen AI. All rights reserved.</p>
      </div>
      <!-- Right: Login Form -->
      <div class="md:w-1/2 p-10 flex flex-col justify-center">
        <h3 class="text-2xl font-bold text-slate-900 mb-2">欢迎回来</h3>
        <p class="text-sm text-slate-500 mb-8">请登录您的企业账号</p>
        <form onsubmit="handleLogin(event)" class="space-y-5">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">企业邮箱</label>
            <div class="relative">
              <iconify-icon icon="mdi:email-outline" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></iconify-icon>
              <input type="email" value="admin@brandlisten.com" class="w-full pl-10 pr-4 py-2.5 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none" placeholder="name@company.com" />
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">密码</label>
            <div class="relative">
              <iconify-icon icon="mdi:lock-outline" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></iconify-icon>
              <input type="password" value="123456" class="w-full pl-10 pr-4 py-2.5 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none" />
            </div>
          </div>
          <div class="flex items-center justify-between text-sm">
            <label class="flex items-center gap-2"><input type="checkbox" checked class="rounded text-indigo-600" /> 记住我</label>
            <a href="#" class="text-indigo-600 hover:underline">忘记密码？</a>
          </div>
          <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 rounded-lg shadow-lg shadow-indigo-200 transition flex items-center justify-center gap-2 text-sm">
            立即登录
            <iconify-icon icon="mdi:arrow-right"></iconify-icon>
          </button>
          <div class="relative my-4"><div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-200"></div></div><div class="relative flex justify-center"><span class="bg-white px-3 text-xs text-slate-400">第三方登录</span></div></div>
          <div class="grid grid-cols-2 gap-3">
            <button type="button" class="flex items-center justify-center gap-2 border border-slate-200 rounded-lg py-2.5 text-sm hover:bg-slate-50 transition"><iconify-icon icon="logos:feishu" class="text-lg"></iconify-icon>飞书</button>
            <button type="button" class="flex items-center justify-center gap-2 border border-slate-200 rounded-lg py-2.5 text-sm hover:bg-slate-50 transition"><iconify-icon icon="logos:dingtalk" class="text-lg"></iconify-icon>钉钉</button>
          </div>
          <p class="text-center text-xs text-slate-400">还没有账号？<a href="#" class="text-indigo-600 hover:underline">申请企业试用</a></p>
        </form>
      </div>
    </div>
  </div>
  <script>
    function handleLogin(e) { e.preventDefault(); window.location.href = "/"; }
  </script>
</body>
</html>
